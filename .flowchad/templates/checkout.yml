# Template: Checkout
# Copy to .flowchad/flows/ and customize for your app.
# Rename file to match your scenario, e.g.:
#   logged-in-user-checks-out-cart-with-credit-card.yml

name: Logged-in user checks out their cart with a credit card and sees order confirmation
url: https://staging.example.com
tags: [payment, critical]
priority: P0
locales: [en]  # auto-detected by /flowchad-setup — update if site adds i18n
context:
  user: existing
  auth: logged_in
  cart_items: 1
credentials:
  email: $TEST_EMAIL
  password: $TEST_PASSWORD

steps:
  - action: navigate
    url: /cart
    expect: >
      Cart page loads with at least one item.
      Checkout button is visible and enabled.
    timing: 2s

  - action: click
    selector: "[data-testid=checkout-button]"
    expect: >
      Checkout form appears with payment fields.
      Order summary shows correct item count and total.
    timing: 2s

  - action: fill
    selector: "#card-number"
    value: "4242424242424242"

  - action: fill
    selector: "#card-expiry"
    value: "12/28"

  - action: fill
    selector: "#card-cvc"
    value: "123"

  - action: click
    selector: "button[type=submit]"
    expect: >
      Order confirmation page with order number and summary.
      Cart is now empty. No error messages about payment failure.
    timing: 5s
