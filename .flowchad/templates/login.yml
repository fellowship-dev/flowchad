# Template: Login
# Copy to .flowchad/flows/ and customize for your app.
# Rename file to match your scenario, e.g.:
#   existing-user-logs-in-with-email-and-password.yml

name: Existing user logs in with email and password and reaches the dashboard
url: https://staging.example.com
tags: [auth, critical]
priority: P0
context:
  user: existing
  auth: logged_out
credentials:
  email: $TEST_EMAIL
  password: $TEST_PASSWORD

steps:
  - action: navigate
    url: /login
    expect: >
      Login form is visible with email and password fields.
      No "session expired" or error banners present.
    timing: 2s

  - action: fill
    selector: "#email"
    value: $TEST_EMAIL

  - action: fill
    selector: "#password"
    value: $TEST_PASSWORD

  - action: click
    selector: "button[type=submit]"
    expect: >
      Redirect to /dashboard because login succeeded.
      User's name or avatar visible in the header, confirming authentication.
    timing: 3s
