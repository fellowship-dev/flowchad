# Template: Login
# Copy to .flowchad/flows/ and customize for your app.

name: login
url: https://staging.example.com
tags: [auth, critical]
priority: P0
credentials:
  email: $TEST_EMAIL
  password: $TEST_PASSWORD

steps:
  - action: navigate
    url: /login
    expect: login form visible
    timing: 2s

  - action: fill
    selector: "#email"
    value: $TEST_EMAIL

  - action: fill
    selector: "#password"
    value: $TEST_PASSWORD

  - action: click
    selector: "button[type=submit]"
    expect: redirect to /dashboard
    timing: 3s
