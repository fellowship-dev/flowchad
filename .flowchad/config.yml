# Flowchad — project configuration
# Copy this file when installing flowchad into your project.

# Project name (used in reports and diagrams)
# name: my-app

# Base URL for flow execution
# url: https://staging.example.com

# Platform type: saas | website | mobile | internal
# See knowledge/platform-types.md for evaluation criteria per type.
# type: saas

# Default timing thresholds (seconds)
# timing:
#   slow: 3       # flag transitions slower than this
#   critical: 10  # flag as critical above this

# Credentials (env var references — never hardcode secrets)
# credentials:
#   email: $TEST_EMAIL
#   password: $TEST_PASSWORD

# Analytics integration (optional — enables metrics collection)
# analytics:
#   provider: posthog  # posthog | mixpanel | amplitude | segment
#   mcp: true          # connect via MCP server if available

# Evidence upload (optional — host screenshots/GIFs for issues/PRs)
# evidence:
#   backend: git       # git (default) | s3 | navvi
#   branch: evidence   # orphan branch name (git backend only)
#   # s3_bucket: my-bucket          # S3/R2 backend
#   # s3_endpoint: https://...      # S3/R2 endpoint URL
#   # s3_public_url: https://...    # public base URL for embedded links

# Speckit integration (optional — cross-reference specs during walks)
# speckit:
#   path: .speckit/    # relative path to speckit directory
# Environments (optional — enables deployment-aware preflight)
# environments:
#   dev:
#     url: http://localhost:3000
#   staging:
#     url: https://staging.example.com
#     deploy_check: gh-actions   # gh-actions | vercel | none
#     deploy_timeout: 300        # seconds to wait for deploy (default: 300)
#   production:
#     url: https://example.com
#     deploy_check: vercel
#     deploy_timeout: 120

# Locales (auto-detected by /flowchad-setup — do not edit manually)
# Run /flowchad-setup to refresh after i18n config changes.
# [en] = English-only site, no locale-prefixed paths.
# [en, es] = generates /es/* paths for flows when walking locale-aware routes.
# locales: [en]

# Navvi persona (optional — enables authenticated flow walks)
# Gopass entry: navvi/{persona}/email and navvi/{persona}/password
# Used for flows that require login, form submissions, email verification.
# persona: flowchad-myapp

# Smoketest config (optional — used by flowchad-runner in cron/CI mode)
# NOTE: Schedule lives in crew.yml, NOT here.
# smoketest:
#   flows: [page-load, contact-form]        # flows to run in smoketest mode
#   skip_production: [contact-form]         # flows to skip on production (unless persona available)
